<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>하나로 가족한마당 — 모바일 초대장</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
  :root {
    --ff-display: 'Gowun Batang', 'Noto Sans KR', serif;
    --ff-body: 'Noto Sans KR', sans-serif;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #EFE6D7;
    font-family: var(--ff-body);
    color: #2A1810;
    overscroll-behavior: none;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  button:active { transform: scale(0.97); }

  /* soft paper bg for stage */
  .stage {
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 12px;
    background:
      radial-gradient(circle at 15% 10%, #F5E6C8 0%, transparent 40%),
      radial-gradient(circle at 85% 90%, #F3D2C0 0%, transparent 45%),
      #EFE6D7;
  }
  /* hide scrollbar in webkit */
  [data-scroll-root]::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="invitation-app.jsx"></script>

<script type="text/babel" data-presets="react">
  const TWEAKS = /*EDITMODE-BEGIN*/{
    "palette": "coral",
    "displayFont": "Gowun Batang",
    "showTweaks": true
  }/*EDITMODE-END*/;

  const PALETTES = {
    coral: {
      ink: '#2A1810', ink2: '#5B3A28', muted: '#8B6F5E',
      cream: '#FFF8EE', paper: '#FFFDF8',
      coral: '#E85A3C', coralDeep: '#C8432A',
      mustard: '#E8B93C', sage: '#6B8F5E',
      line: 'rgba(42,24,16,0.12)',
    },
    hanbok: {
      ink: '#1F2340', ink2: '#3B3F6B', muted: '#7B7FA3',
      cream: '#F5EEE0', paper: '#FBF6ED',
      coral: '#C23B4A', coralDeep: '#9B1E2C',
      mustard: '#D9A441', sage: '#3D6A5C',
      line: 'rgba(31,35,64,0.14)',
    },
    sage: {
      ink: '#223028', ink2: '#3E5544', muted: '#7A8D7F',
      cream: '#F2EFE4', paper: '#FAF8EE',
      coral: '#D97752', coralDeep: '#B55A3A',
      mustard: '#C9A646', sage: '#4F7A5C',
      line: 'rgba(34,48,40,0.12)',
    },
  };

  const FONTS = {
    'Gowun Batang':  "'Gowun Batang', 'Noto Sans KR', serif",
    'Gowun Dodum':   "'Gowun Dodum', 'Noto Sans KR', sans-serif",
    'Noto Sans KR':  "'Noto Sans KR', sans-serif",
  };

  function App() {
    const [tweaks, setTweaks] = useTweaks(TWEAKS);

    React.useEffect(() => {
      const p = PALETTES[tweaks.palette] || PALETTES.coral;
      Object.assign(window.BRAND, p);
      document.documentElement.style.setProperty('--ff-display', FONTS[tweaks.displayFont] || FONTS['Gowun Batang']);
    }, [tweaks.palette, tweaks.displayFont]);

    // force re-render on palette change by keying the frame
    const key = `${tweaks.palette}-${tweaks.displayFont}`;

    return (
      <div className="stage">
        <IOSDevice width={390} height={820} dark={false}>
          <InvitationContent key={key}/>
        </IOSDevice>

        <TweaksPanel title="Tweaks">
          <TweakSection title="Palette">
            <TweakRadio
              value={tweaks.palette}
              onChange={(v) => setTweaks({ palette: v })}
              options={[
                { value: 'coral',  label: 'Coral · 따뜻한 축제' },
                { value: 'hanbok', label: 'Hanbok · 단정한 한국의 색' },
                { value: 'sage',   label: 'Sage · 자연의 초록' },
              ]}
            />
          </TweakSection>

          <TweakSection title="Display Font">
            <TweakRadio
              value={tweaks.displayFont}
              onChange={(v) => setTweaks({ displayFont: v })}
              options={[
                { value: 'Gowun Batang', label: '고운바탕 (명조)' },
                { value: 'Gowun Dodum',  label: '고운도담 (손글씨)' },
                { value: 'Noto Sans KR', label: 'Noto Sans (산세리프)' },
              ]}
            />
          </TweakSection>
        </TweaksPanel>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
