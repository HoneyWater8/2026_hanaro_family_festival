<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wave Layers · 하나로 가족한마당</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Black+Han+Sans&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #F8F6F1;
    font-family: 'Pretendard', -apple-system, sans-serif;
    color: #0F2A3D;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }
  #root {
    height: 100vh;
    height: 100dvh;
    width: 100vw;
    display: flex;
    align-items: stretch;
    justify-content: center;
  }
  /* 프레임 OFF (기본): 풀 뷰포트 — body 배경은 첫 섹션 컬러와 동일 */
  body.no-frame { background: #F8F6F1; }
  /* 프레임 ON: 가운데 정렬 + 어두운 배경 */
  body.frame-on { background: #0F2A3D; }
  body.frame-on #root { align-items: center; }
  /* 토글 버튼 */
  .frame-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 1000;
    width: 44px; height: 28px; border-radius: 999px;
    background: rgba(15,42,61,0.5); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer; padding: 0;
    transition: background 0.25s ease;
  }
  body.no-frame .frame-toggle { background: rgba(15,42,61,0.15); border-color: rgba(15,42,61,0.2); }
  .frame-toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #fff;
    transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  }
  body.frame-on .frame-toggle::after { transform: translateX(16px); background: #FFC93C; }
  .frame-toggle-label {
    position: fixed; top: 22px; right: 70px; z-index: 1000;
    font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 2px;
    color: rgba(255,255,255,0.7); pointer-events: none;
  }
  body.no-frame .frame-toggle-label { color: rgba(15,42,61,0.55); }
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
  .no-scrollbar::-webkit-scrollbar { width: 0; height: 0; display: none; }

  @keyframes wl-flip {
    0%   { transform: translateY(8px) scale(0.92); opacity: 0; }
    60%  { transform: translateY(-2px) scale(1.04); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  @keyframes wl-card-pop {
    0%   { transform: scale(0.96); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes wl-modal-in {
    0%   { transform: translate(-50%, -48%) scale(0.92); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
  @keyframes wl-overlay-in {
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }
</style>
</head>
<body class="no-frame">
<button class="frame-toggle" aria-label="Toggle device frame" onclick="document.body.classList.toggle('frame-on'); document.body.classList.toggle('no-frame'); window.dispatchEvent(new Event('frame-toggle'));"></button>
<span class="frame-toggle-label">FRAME</span>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="concept-d-data.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="wave-layers-app.jsx"></script>
</body>
</html>
